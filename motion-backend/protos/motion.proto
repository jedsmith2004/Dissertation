syntax = "proto3";

package motion;

option csharp_namespace = "Motion";

service MotionService {
  // Sanity check
  rpc Ping (Empty) returns (PingResponse);

  // TESTING: Prove round trip
  rpc GetDummyBVH (Empty) returns (MotionReply);

  // TODO: Later, generate and serve actual BVH
  rpc Generate (GenerateRequest) returns (GenerateReply);
  rpc GenerateBatch (BatchGenerateRequest) returns (BatchGenerateReply);
  rpc Edit (EditRequest) returns (EditReply);
  rpc EditBatch (BatchEditRequest) returns (BatchEditReply);
}

message Empty {}

message PingResponse {
  string version = 1;
  bool cuda_available = 2;
  string device_name = 3;
}

enum MotionFormat {
  BVH = 0;
  JSON = 1;
}

enum MotionModel {
  T2M_GPT = 0;
  MOMASK = 1;
}

message GenerateRequest {
  string prompt = 1;
  int32 fps = 2;
  float duration_seconds = 3;
  int32 seed = 4;
  MotionFormat format = 5;
  MotionModel model = 6;
}

message GenerateReply {
  MotionFormat format = 1;
  bytes data = 2;
  string meta = 3;
  string filename = 4;
}

message BatchGenerateRequest {
  string prompt = 1;
  int32 fps = 2;
  float duration_seconds = 3;
  int32 count = 4;
  bool use_random_seed = 5;
  int32 seed = 6;
  MotionFormat format = 7;
  MotionModel model = 8;
}

message BatchGenerateReply {
  repeated GenerateReply items = 1;
}

message MotionJointSequence {
  int32 fps = 1;
  int32 frame_count = 2;
  int32 joint_count = 3;
  repeated float joint_positions = 4;
}

message EditRange {
  float start_seconds = 1;
  float end_seconds = 2;
}

message EditRequest {
  string prompt = 1;
  int32 fps = 2;
  int32 seed = 3;
  MotionFormat format = 4;
  MotionModel model = 5;
  MotionJointSequence source_motion = 6;
  repeated EditRange edit_ranges = 7;
}

message EditReply {
  GenerateReply item = 1;
}

message BatchEditRequest {
  string prompt = 1;
  int32 fps = 2;
  int32 count = 3;
  bool use_random_seed = 4;
  int32 seed = 5;
  MotionFormat format = 6;
  MotionModel model = 7;
  MotionJointSequence source_motion = 8;
  repeated EditRange edit_ranges = 9;
}

message BatchEditReply {
  repeated GenerateReply items = 1;
}

message MotionReply {
  MotionFormat format = 1;  // BVH or JSON
  bytes data = 2;           // Raw file bytes (BVH text or JSON)
  string meta = 3;          // Optional: fps, skeleton profile, etc.
  string filename = 4;     // suggested filename
}