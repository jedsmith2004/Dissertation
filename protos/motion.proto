syntax = "proto3";

package motion;

// Simple text -> motion service returning a BVH (or JSON) payload.
service MotionGen {
  rpc Generate (GenerateRequest) returns (GenerateReply);
}

message GenerateRequest {
  string prompt = 1;
}

enum MotionFormat {
  BVH = 0;
  JSON = 1;
}

message GenerateReply {
  MotionFormat format = 1;  // BVH or JSON
  bytes data = 2;           // Raw file bytes (BVH text or JSON)
  string meta = 3;          // Optional: fps, skeleton profile, etc.
}

// TESTING

service MotionService {
  rpc Ping (Empty) returns (PingResponse);
}

message Empty {}

message PingResponse {
  string version = 1;
  bool cuda_available = 2;
  string device_name = 3;
}